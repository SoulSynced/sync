<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Sync | Find Your Fellow Loner</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="emoji-container"></div>
    <div id="landing-screen" class="container">
        <h1 class="logo">Soul Sync</h1>
        <p class="subtitle">Find your compatible loner!</p>
        <button type="button" onclick="nextStep('form-screen')">Get Started</button>
    </div>
    <div id="form-screen" class="container hidden">
        <h1 class="logo-small">Soul Sync</h1>
        <form id="matchForm">
            <div id="step-1" class="form-step">
                <h3>Your Information</h3>
                <input type="text" id="name" placeholder="Name" required>
                <input type="number" id="age" placeholder="Age" required>
                <select id="gender" required></select>
                <select id="job" required></select>
                <input type="text" id="contact" placeholder="Social media / Contact (Optional)">
                <div class="nav-btns">
                    <button type="button" onclick="nextStep('step-2')">Next ➔</button>
                </div>
            </div>
            <div id="step-2" class="form-step hidden">
                <h3>About You</h3>
                <div class="selection-group">
                    <p>Activities <span class="hint">(Select 2)</span></p>
                    <div id="activityList" class="grid-list"></div>
                </div>
                <div class="selection-group">
                    <p>Movie Preference</p>
                    <div id="movieList" class="grid-list"></div>
                </div>
                <div class="selection-group">
                    <p>Love Language</p>
                    <div id="loveList" class="grid-list"></div>
                </div>
                <div class="nav-btns">
                    <button type="button" class="btn-alt" onclick="nextStep('step-1')">Back</button>
                    <button type="button" onclick="nextStep('step-3')">Next ➔</button>
                </div>
            </div>
            <div id="step-3" class="form-step hidden">
                <h3>Vibe Check</h3>
                <div class="selection-group">
                    <p>Your Personality <span class="hint">(Select 2)</span></p>
                    <div id="userTraitList" class="grid-list"></div>
                </div>
                <div class="selection-group">
                    <p>Looking for in a Loner <span class="hint">(Select 2)</span></p>
                    <div id="targetTraitList" class="grid-list"></div>
                </div>
                <div class="selection-group">
                    <p>Sense of Humor</p>
                    <div id="humorList" class="grid-list"></div>
                </div>
                <div class="selection-group">
                    <p>Preferred Age Range</p>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="minAge" placeholder="Min" min="13">
                        <input type="number" id="maxAge" placeholder="Max" min="13">
                    </div>
                </div>
                <select id="prefGender" required></select>
                <div class="nav-btns">
                    <button type="button" class="btn-alt" onclick="nextStep('step-2')">Back</button>
                    <button type="button" id="syncBtn" onclick="runMatchmaking()">Begin Sync</button>
                </div>
            </div>
        </form>
    </div>
    <div id="results" class="container hidden">
        <h2 class="logo-small">Optimal Loners</h2>
        <div id="matchDisplay"></div>
        <button type="button" onclick="resetForm()">New Sync</button>
    </div>
    <div id="profileModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
