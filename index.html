<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Synced | Find Your Fellow Loner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="emoji-container"></div>
    <div class="container">
        <h1>Soul Synced ✨</h1>
        <p class="subtitle">Are you lonely? You're in luck! Answer these prompts to find a compatible loner for you!</p>

        <form id="matchForm">
            <section>
                <h3>Step 1: Your Profile</h3>
                <input type="text" id="name" placeholder="Name / Nickname" required>
                <input type="number" id="age" placeholder="Age" required>
                
                <select id="gender" required>
                    <option value="" disabled selected>Your Gender Identity</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Nonbinary">Nonbinary</option>
                    <option value="Genderqueer">Genderqueer / Fluid</option>
                    <option value="Other">Other</option>
                </select>

                <div class="selection-group">
                    <p>Select 2 Activities:</p>
                    <div id="activityList"></div>
                </div>

                <div class="selection-group">
                    <p>Select 3 Core Traits:</p>
                    <div id="userTraitList"></div>
                </div>
            </section>

            <hr>

            <section>
                <h3>Step 2: Sync Preferences</h3>
                <select id="prefGender" required>
                    <option value="" disabled selected>Seeking...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Nonbinary">Nonbinary</option>
                    <option value="Genderqueer">Genderqueer / Fluid</option>
                    <option value="Any">Open to All</option>
                </select>

                <div class="age-range">
                    <input type="number" id="minAge" placeholder="Min Age" required>
                    <input type="number" id="maxAge" placeholder="Max Age" required>
                </div>

                <div class="selection-group">
                    <p>Partner Traits (Select 3):</p>
                    <div id="prefTraitList"></div>
                </div>
            </section>

            <button type="button" id="syncBtn" onclick="runMatchmaking()">Begin Sync</button>
        </form>

        <div id="results" class="hidden">
            <h2>Optimal Matches Found</h2>
            <div id="matchDisplay"></div>
            <button type="button" onclick="resetForm()">New Sync</button>
        </div>

        <p style="margin-top: 30px;">
            <a href="#" onclick="clearData()" style="color: #ccc; font-size: 0.7rem; text-decoration: none;">Reset System Database</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
